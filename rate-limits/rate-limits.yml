name: Bitstamp API Rate Limits
description: Bitstamp enforces rate limits on both REST and WebSocket API calls. All clients receive 400 requests per second with a default burst threshold of 10,000 requests per 10-minute window. Higher limits are available via commercial agreements. WebSocket connections use token-based authentication obtained via REST.
rateLimits:
  - name: Standard REST Rate Limit
    description: Default rate limit applied to all API clients for public and private REST endpoints.
    requests: 400
    period: 1 second
    scope: per client
    notes: Default threshold is 10,000 requests per 10 minutes. Sustained bursting beyond this triggers throttling.
  - name: Burst Threshold
    description: Maximum aggregate requests allowed in a 10-minute rolling window under the standard plan.
    requests: 10000
    period: 10 minutes
    scope: per client
  - name: WebSocket Rate Limit
    description: WebSocket connections follow the same underlying rate limit policy as REST endpoints. Authentication tokens are obtained via POST /api/v2/websockets_token/ and are subject to REST limits.
    notes: Real-time streaming via WebSocket is the recommended approach for high-frequency market data consumption to reduce REST polling.
errorCodes:
  - code: '400.002'
    description: Request rejected due to exceeded rate limit
  - code: '400.067'
    description: Client-level rate limit breach
  - code: '400.068'
    description: Market-level rate limit constraint reached
customLimits:
  description: Clients requiring higher throughput than 400 requests/second may negotiate custom rate limit agreements directly with Bitstamp.
  contactUrl: https://www.bitstamp.net/institutional/
